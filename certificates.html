<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mis Certificados — Objetivo 500</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .cert-card {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4);
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      transition: border-color .2s;
    }
    .cert-card:hover { border-color: var(--accent-purple); }
    .cert-card__icon { font-size: 2.4rem; flex-shrink: 0; width: 48px; text-align: center; }
    .cert-card__body { flex: 1; }
    .cert-card__title { font-weight: 700; font-size: .95rem; margin: 0 0 2px; }
    .cert-card__date  { font-size: .75rem; color: var(--text-muted); margin: 0 0 4px; }
    .cert-card__tier  { font-size: .68rem; font-weight: 700; letter-spacing: .06em; }
    .cert-card__dl    { flex-shrink: 0; }
    .cert-preview-canvas { border-radius: var(--radius-lg); width: 100%; max-width: 500px; display: block; margin: 0 auto; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo">
      <div class="logo-icon" aria-hidden="true">🏅</div>
      Mis Certificados
    </div>
    <div class="navbar__actions">
      <button class="btn btn--ghost btn--sm" onclick="window.location.href='app.html'">← Inicio</button>
    </div>
  </nav>

  <main id="cert-root" style="max-width:700px;margin:0 auto;padding:var(--space-6) var(--space-4) var(--space-16)">
    <div class="empty-state" style="padding-top:80px">
      <div style="font-size:2rem;margin-bottom:16px">⏳</div>
      <p>Cargando…</p>
    </div>
  </main>

  <div id="cert-modal-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);align-items:center;justify-content:center;padding:16px">
    <div style="max-width:560px;width:100%;text-align:center">
      <canvas id="cert-preview" style="border-radius:12px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.6)"></canvas>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
        <button id="cert-dl-btn" class="btn btn--primary">⬇ Descargar PNG</button>
        <button class="btn btn--ghost" onclick="document.getElementById('cert-modal-overlay').style.display='none'">Cerrar</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="false"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/supabase-config.js"></script>
  <script>
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true },
    });

    async function requireAuth(role) {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = './login.html'; return null; }
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = './login.html'; return null; }
      const { data: profile } = await supabase
        .from('profiles').select('*').eq('user_id', user.id).maybeSingle();
      if (!profile) { window.location.href = './login.html'; return null; }
      if (role && profile.role !== role) {
        window.location.href = './app.html'; return null;
      }
      return profile;
    }

    function showToast(title, msg, icon, type) {
      const c = document.getElementById('toast-container');
      if (!c) return;
      const t = document.createElement('div');
      t.className = `toast toast--${type ?? 'info'}`;
      t.innerHTML = `<span class="toast__icon">${icon ?? 'ℹ️'}</span><div><strong>${title}</strong>${msg ? '<br>' + msg : ''}</div>`;
      c.appendChild(t); setTimeout(() => t.remove(), 5000);
    }
  </script>

  <script src="lib/certificates.js"></script>

  <script>
    let _studentName = '';

    document.addEventListener('DOMContentLoaded', async () => {
      const profile = await requireAuth('student');
      if (!profile) return;

      _studentName = profile.username ?? 'Estudiante';

      const { data: student } = await supabase
        .from('students').select('id').eq('profile_id', profile.id).maybeSingle();
      if (!student) return;

      const certs = await Certificates.getAll(student.id);
      Certificates._setCache(certs);
      render(certs, student.id);
    });

    function render(certs, studentId) {
      const root = document.getElementById('cert-root');

      if (!certs || certs.length === 0) {
        root.innerHTML = `
          <div class="empty-state" style="padding-top:60px">
            <div style="font-size:3rem;margin-bottom:16px">🏅</div>
            <p style="font-weight:600;margin-bottom:8px">Aún no tienes certificados</p>
            <p style="color:var(--text-muted);font-size:.85rem;margin-bottom:var(--space-6)">
              Practica más, mantén tu racha y alcanza hitos de puntaje para desbloquearlos.
            </p>
            <button class="btn btn--primary" onclick="window.location.href='app.html'">Ir a practicar</button>
          </div>`;
        return;
      }

      root.innerHTML = `
        <h1 style="font-size:1.3rem;font-weight:800;margin-bottom:var(--space-2)">Mis Certificados</h1>
        <p style="color:var(--text-muted);font-size:.85rem;margin-bottom:var(--space-6)">${certs.length} certificado${certs.length > 1 ? 's' : ''} obtenido${certs.length > 1 ? 's' : ''}</p>
        <div style="display:flex;flex-direction:column;gap:var(--space-3)">
          ${certs.map(c => certCardWithPreview(c)).join('')}
        </div>`;
    }

    function certCardWithPreview(cert) {
      const SUBJECT_LABELS = {
        lectura_critica:'Lectura Crítica', matematicas:'Matemáticas',
        sociales:'Sociales y Ciudadanas', ciencias_naturales:'Ciencias Naturales', ingles:'Inglés',
      };
      const CERT_META = {
        streak_7:      { emoji:'🔥', title:'Racha de 7 días' },
        streak_30:     { emoji:'🌟', title:'Racha de 30 días' },
        questions_50:  { emoji:'📚', title:'50 Preguntas Respondidas' },
        questions_200: { emoji:'⭐', title:'200 Preguntas Respondidas' },
        questions_500: { emoji:'💎', title:'500 Preguntas Respondidas' },
        score_300:     { emoji:'🎯', title:'Puntaje estimado 300+' },
        score_400:     { emoji:'🚀', title:'Puntaje estimado 400+' },
        score_450:     { emoji:'🏆', title:'Puntaje estimado 450+' },
        subject_master:{ emoji:'🎓', title:'Maestro en {subject}' },
      };
      const tierColors = { bronce:'#CD7F32', plata:'#C0C0C0', oro:'#D4AF37' };
      const tierMap    = { streak_7:'bronce', streak_30:'plata', questions_50:'bronce',
        questions_200:'plata', questions_500:'oro', score_300:'bronce',
        score_400:'plata', score_450:'oro', subject_master:'plata' };

      const base  = CERT_META[cert.type] ?? { emoji:'🏅', title: cert.type };
      const title = cert.type === 'subject_master' && cert.subject
        ? `Maestro en ${SUBJECT_LABELS[cert.subject] ?? cert.subject}` : base.title;
      const tier  = tierMap[cert.type] ?? 'bronce';
      const fecha = new Date(cert.awarded_at).toLocaleDateString('es-CO', { day:'numeric', month:'short', year:'numeric' });
      const COLOR_MAP = {
        streak_7:'#F59E0B', streak_30:'#3B82F6', questions_50:'#10B981',
        questions_200:'#7C3AED', questions_500:'#D4AF37', score_300:'#10B981',
        score_400:'#3B82F6', score_450:'#D4AF37', subject_master:'#7C3AED',
      };
      const color = COLOR_MAP[cert.type] ?? '#94A3B8';

      return `
        <div class="cert-card" style="border-color:${color}40">
          <div class="cert-card__icon">${base.emoji}</div>
          <div class="cert-card__body">
            <p class="cert-card__title">${title}</p>
            <p class="cert-card__date">${fecha}</p>
            <span class="cert-card__tier" style="color:${tierColors[tier]}">${tier.toUpperCase()}</span>
          </div>
          <div style="display:flex;gap:8px;flex-shrink:0">
            <button class="btn btn--ghost btn--sm" onclick="previewCert('${cert.id}')">👁</button>
            <button class="btn btn--ghost btn--sm" onclick="Certificates._downloadById('${cert.id}','${_studentName.replace(/'/g,"\\'")}')">⬇</button>
          </div>
        </div>`;
    }

    window.previewCert = function(certId) {
      // Buscar en cache del módulo
      const allCerts = window._certsCache || [];
      const cert = allCerts.find(c => c.id === certId);
      if (!cert) return;

      const canvas  = Certificates.render(cert, _studentName);
      const preview = document.getElementById('cert-preview');
      const overlay = document.getElementById('cert-modal-overlay');

      preview.width  = canvas.width;
      preview.height = canvas.height;
      preview.getContext('2d').drawImage(canvas, 0, 0);
      overlay.style.display = 'flex';

      document.getElementById('cert-dl-btn').onclick = () =>
        Certificates._downloadById(certId, _studentName);
    };
  </script>
</body>
</html>
