<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5d0fe"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </radialGradient>
    <linearGradient id="maneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="80%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="hornGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <!-- tail -->
  <path d="M132,148 Q162,135 168,110 Q158,110 154,122 Q155,106 144,112" fill="none" stroke="url(#maneGrad)" stroke-width="7" stroke-linecap="round"/>
  <!-- legs -->
  <rect x="76" y="152" width="11" height="30" rx="5" fill="#a855f7"/>
  <rect x="95" y="156" width="11" height="26" rx="5" fill="#a855f7"/>
  <rect x="108" y="152" width="11" height="30" rx="5" fill="#a855f7"/>
  <!-- hooves -->
  <ellipse cx="82" cy="182" rx="8" ry="4" fill="#6b21a8"/>
  <ellipse cx="101" cy="182" rx="8" ry="4" fill="#6b21a8"/>
  <ellipse cx="114" cy="182" rx="8" ry="4" fill="#6b21a8"/>
  <!-- body -->
  <ellipse cx="100" cy="132" rx="38" ry="35" fill="url(#bodyGrad)"/>
  <!-- belly -->
  <ellipse cx="100" cy="140" rx="20" ry="22" fill="#fae8ff" opacity="0.7"/>
  <!-- neck -->
  <rect x="88" y="90" width="24" height="36" rx="12" fill="#c084fc"/>
  <!-- mane on neck -->
  <path d="M82,92 Q70,104 72,120 Q80,112 80,124" fill="url(#maneGrad)" opacity="0.9"/>
  <!-- head -->
  <ellipse cx="100" cy="78" rx="28" ry="24" fill="#c084fc"/>
  <!-- snout -->
  <ellipse cx="108" cy="88" rx="12" ry="8" fill="#f5d0fe"/>
  <circle cx="106" cy="88" r="1.5" fill="#7e22ce" opacity="0.6"/>
  <circle cx="112" cy="88" r="1.5" fill="#7e22ce" opacity="0.6"/>
  <!-- eyes -->
  <circle cx="86" cy="74" r="9" fill="#1e1b4b"/>
  <circle cx="111" cy="74" r="9" fill="#1e1b4b"/>
  <circle cx="88" cy="72" r="4" fill="#a78bfa"/>
  <circle cx="113" cy="72" r="4" fill="#a78bfa"/>
  <circle cx="89" cy="73" r="2" fill="white"/>
  <circle cx="114" cy="73" r="2" fill="white"/>
  <!-- horn -->
  <polygon points="100,50 95,72 105,72" fill="url(#hornGrad)"/>
  <line x1="100" y1="50" x2="97" y2="65" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <!-- mane on head -->
  <path d="M78,64 Q64,74 66,88 Q74,80 76,90" fill="url(#maneGrad)" opacity="0.85"/>
  <!-- sparkles -->
  <text x="136" y="72" font-size="11" fill="#f0abfc">✦</text>
  <text x="58" y="100" font-size="9" fill="#c084fc">✦</text>
  <text x="140" y="126" font-size="8" fill="#e879f9">✦</text>
</svg>
