  <path d="M62,120 Q42,110 32,124 Q42,126 44,138 Q54,130 58,140 Z" fill="#78350f"/>
  <path d="M138,120 Q158,110 168,124 Q158,126 156,138 Q146,130 142,140 Z" fill="#78350f"/>
  <!-- talon claws -->
  <path d="M34,124 L26,118" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38,132 L30,130" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M44,138 L38,144" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M166,124 L174,118" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M162,132 L170,130" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M156,138 L162,144" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eagle wings spread -->
  <path d="M62,88 Q18,46 12,90 Q28,76 36,94 Q16,108 18,136 Q36,118 50,130 Q36,152 44,168 Q58,148 62,158 Z" fill="#78350f" opacity="0.95"/>
  <path d="M138,88 Q182,46 188,90 Q172,76 164,94 Q184,108 182,136 Q164,118 150,130 Q164,152 156,168 Q142,148 138,158 Z" fill="#78350f" opacity="0.95"/>
  <!-- wing feathers -->
  <path d="M20,92 Q34,80 46,92" fill="none" stroke="#d97706" stroke-width="2"/>
  <path d="M20,106 Q34,96 46,106" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <path d="M20,120 Q34,112 48,120" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <path d="M180,92 Q166,80 154,92" fill="none" stroke="#d97706" stroke-width="2"/>
  <path d="M180,106 Q166,96 154,106" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <path d="M180,120 Q166,112 152,120" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <!-- neck -->
  <rect x="86" y="72" width="28" height="36" rx="14" fill="#92400e"/>
  <!-- eagle head -->
  <circle cx="100" cy="60" r="30" fill="url(#eagleGrad)"/>
  <!-- white face mask -->
  <ellipse cx="100" cy="66" rx="20" ry="18" fill="#fffbeb"/>
  <!-- fierce beak -->
  <path d="M90,74 L116,68 L102,88 Z" fill="#f59e0b"/>
  <!-- crown of feathers -->
  <path d="M78,44 Q82,30 88,38 Q94,26 100,36 Q106,24 112,36 Q118,28 122,44" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- feather tufts -->
  <path d="M80,44 Q76,30 82,36 Z" fill="#92400e"/>
  <path d="M100,40 Q97,26 103,32 Z" fill="#92400e"/>
  <path d="M120,44 Q124,30 118,36 Z" fill="#92400e"/>
  <!-- eyes fierce -->
  <ellipse cx="86" cy="58" rx="9" ry="7" fill="#0c0a09" transform="rotate(-10,86,58)"/>
  <ellipse cx="114" cy="58" rx="9" ry="7" fill="#0c0a09" transform="rotate(10,114,58)"/>
  <circle cx="88" cy="56" r="4" fill="#fbbf24"/>
  <circle cx="116" cy="56" r="4" fill="#fbbf24"/>
  <circle cx="89" cy="57" r="2" fill="white"/>
  <circle cx="117" cy="57" r="2" fill="white"/>
  <!-- lightning bolt accent -->
  <path d="M148,46 L140,60 L146,60 L138,76" fill="none" stroke="#fde047" stroke-width="2.5" stroke-linecap="round"/>
</svg>
