<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="eagleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="lionGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="110" rx="90" ry="90" fill="url(#glowGold)"/>
  <!-- lion tail with tuft -->
  <path d="M132,150 Q164,140 172,112 Q162,110 158,124 Q158,106 148,112" fill="none" stroke="#d97706" stroke-width="9" stroke-linecap="round"/>
  <circle cx="172" cy="110" r="10" fill="#b45309"/>
  <!-- lion hind legs -->
  <path d="M76,158 Q70,172 62,178 Q72,174 78,180 Q86,174 82,160 Z" fill="#b45309"/>
  <path d="M114,158 Q118,172 124,178 Q116,174 110,180 Q104,174 108,160 Z" fill="#b45309"/>
  <!-- paw pads -->
  <ellipse cx="70" cy="180" rx="9" ry="5" fill="#92400e"/>
  <ellipse cx="116" cy="180" rx="9" ry="5" fill="#92400e"/>
  <!-- lion body lower -->
  <ellipse cx="100" cy="140" rx="40" ry="32" fill="url(#lionGrad)"/>
  <!-- eagle body upper -->
  <ellipse cx="100" cy="110" rx="38" ry="36" fill="#92400e"/>
  <!-- chest feathers -->
