<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>
  <!-- flame tail -->
  <path d="M118,148 Q148,130 158,104 Q145,108 140,122 Q142,100 126,110" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
  <path d="M122,142 Q152,126 162,100" fill="none" stroke="#fde047" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- flame feet -->
  <path d="M82,170 Q78,160 84,155 Q88,162 92,155 Q96,162 92,170 Z" fill="url(#flameGrad)"/>
  <path d="M108,170 Q104,160 110,155 Q114,162 118,155 Q122,162 118,170 Z" fill="url(#flameGrad)"/>
