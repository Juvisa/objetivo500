  <ellipse cx="100" cy="128" rx="36" ry="36" fill="url(#bodyGrad)"/>
  <!-- breast feathers -->
  <ellipse cx="100" cy="132" rx="20" ry="22" fill="#fef9c3" opacity="0.85"/>
  <!-- wing left - large flame wing -->
  <path d="M64,100 Q28,60 22,100 Q36,88 42,104 Q26,116 30,138 Q44,122 56,132 Q44,148 50,162 Q62,144 64,152 Z" fill="#ea580c"/>
  <path d="M30,100 Q42,90 50,102" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M28,114 Q40,106 50,116" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M30,128 Q42,122 52,130" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <!-- wing right -->
  <path d="M136,100 Q172,60 178,100 Q164,88 158,104 Q174,116 170,138 Q156,122 144,132 Q156,148 150,162 Q138,144 136,152 Z" fill="#ea580c"/>
  <path d="M170,100 Q158,90 150,102" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M172,114 Q160,106 150,116" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M170,128 Q158,122 148,130" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <!-- neck -->
  <rect x="88" y="85" width="24" height="30" rx="12" fill="#f97316"/>
  <!-- head -->
  <circle cx="100" cy="72" r="26" fill="#fb923c"/>
  <!-- flame crest -->
  <path d="M82,56 Q88,38 94,50 Q98,34 100,46 Q102,30 108,46 Q114,36 118,54 Q108,44 100,52 Q94,42 82,56 Z" fill="url(#flameGrad)"/>
  <!-- beak -->
  <path d="M94,82 L112,78 L102,92 Z" fill="#fbbf24"/>
  <!-- eyes -->
  <circle cx="87" cy="68" r="8" fill="#1c1917"/>
  <circle cx="113" cy="68" r="8" fill="#1c1917"/>
  <circle cx="89" cy="66" r="3.5" fill="#fde047"/>
  <circle cx="115" cy="66" r="3.5" fill="#fde047"/>
  <circle cx="90" cy="67" r="2" fill="white"/>
  <circle cx="116" cy="67" r="2" fill="white"/>
</svg>
