<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="egg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="60%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="115" rx="55" ry="72" fill="url(#glow)"/>
  <ellipse cx="100" cy="108" rx="46" ry="62" fill="url(#egg)" stroke="#b91c1c" stroke-width="2"/>
  <!-- crack lines -->
  <polyline points="95,70 100,82 92,90 105,105" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="108,95 115,88 120,98" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <!-- glow speck -->
  <circle cx="82" cy="88" r="4" fill="#fde68a" opacity="0.8"/>
  <circle cx="116" cy="100" r="3" fill="#fed7aa" opacity="0.7"/>
  <!-- rune marks -->
