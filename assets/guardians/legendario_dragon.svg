  <path d="M10,86 Q26,70 40,86" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <path d="M10,104 Q26,90 40,104" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <path d="M10,122 Q26,110 40,120" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <path d="M12,140 Q26,130 42,138" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <path d="M190,86 Q174,70 160,86" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <path d="M190,104 Q174,90 160,104" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <path d="M190,122 Q174,110 160,120" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <path d="M188,140 Q174,130 158,138" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <!-- neck armored -->
  <rect x="84" y="66" width="32" height="42" rx="16" fill="#dc2626"/>
  <!-- neck spikes golden -->
  <polygon points="86,70 78,52 92,66" fill="#fbbf24"/>
  <polygon points="100,66 96,48 104,62" fill="#fbbf24"/>
  <polygon points="114,70 122,52 108,66" fill="#fbbf24"/>
  <!-- head LARGE and armored -->
  <ellipse cx="100" cy="52" rx="38" ry="30" fill="#ef4444"/>
  <!-- head armor plating -->
  <path d="M68,44 Q100,36 132,44 Q128,52 100,56 Q72,52 68,44 Z" fill="#b91c1c" opacity="0.5"/>
  <!-- massive horns -->
  <polygon points="80,34 66,6 88,28" fill="#fbbf24" filter="url(#glow)"/>
  <polygon points="120,34 134,6 112,28" fill="#fbbf24" filter="url(#glow)"/>
  <polygon points="86,30 80,14 92,26" fill="#dc2626"/>
  <polygon points="114,30 120,14 108,26" fill="#dc2626"/>
  <!-- third eye rune -->
  <ellipse cx="100" cy="42" rx="5" ry="4" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
  <!-- snout -->
  <ellipse cx="100" cy="64" rx="20" ry="13" fill="#fca5a5"/>
  <circle cx="91" cy="62" r="3.5" fill="#450a0a"/>
  <circle cx="109" cy="62" r="3.5" fill="#450a0a"/>
  <!-- eyes POWERFUL -->
  <ellipse cx="83" cy="47" rx="11" ry="9" fill="#0c0a09" transform="rotate(-15,83,47)"/>
  <ellipse cx="117" cy="47" rx="11" ry="9" fill="#0c0a09" transform="rotate(15,117,47)"/>
  <circle cx="85" cy="45" r="5" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="119" cy="45" r="5" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="86" cy="46" r="2.5" fill="white"/>
  <circle cx="120" cy="46" r="2.5" fill="white"/>
  <!-- LEGENDARY fire breath -->
  <path d="M114,65 Q132,48 154,56 Q148,68 136,72 Q148,72 155,80 Q140,82 128,76 Q120,88 112,78 Z" fill="#fbbf24" opacity="0.95" filter="url(#glow)"/>
  <path d="M122,60 Q140,44 160,52" fill="none" stroke="#fde047" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- stars around -->
  <text x="4" y="56" font-size="12" fill="#fbbf24" opacity="0.8">★</text>
  <text x="180" y="58" font-size="10" fill="#fbbf24" opacity="0.7">★</text>
  <text x="8" y="172" font-size="11" fill="#ef4444" opacity="0.7">★</text>
  <text x="178" y="170" font-size="9" fill="#fbbf24" opacity="0.8">★</text>
</svg>
