<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="70%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>
    <radialGradient id="aura1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- outer aura rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="100" cy="105" rx="80" ry="82" fill="url(#aura1)"/>
  <!-- gold aura inner -->
  <ellipse cx="100" cy="100" rx="55" ry="58" fill="url(#goldGlow)"/>
  <!-- tail -->
  <path d="M130,148 Q168,136 178,106 Q164,104 160,118 Q162,98 148,106" fill="none" stroke="#dc2626" stroke-width="10" stroke-linecap="round"/>
  <!-- tail tip flame -->
  <path d="M178,104 Q186,90 192,98 Q184,108 178,118 Q182,106 178,104 Z" fill="#fbbf24" filter="url(#glow)"/>
  <!-- gold rune markings on body -->
  <!-- legs armored -->
  <path d="M76,156 Q68,172 60,180 Q72,176 78,184 Q88,176 82,160 Z" fill="#b91c1c"/>
  <path d="M116,156 Q122,172 128,180 Q118,176 112,184 Q102,176 108,160 Z" fill="#b91c1c"/>
  <!-- armor on legs -->
  <path d="M64,176 L56,186" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M70,180 L66,190" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M78,182 L80,192" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M126,176 L134,186" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M120,180 L122,190" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M112,182 L110,192" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- body main -->
  <ellipse cx="100" cy="120" rx="44" ry="46" fill="url(#bodyGrad)"/>
  <!-- gold armor plates on belly -->
  <ellipse cx="100" cy="130" rx="26" ry="32" fill="#7f1d1d" opacity="0.4"/>
  <path d="M78,114 Q100,105 122,114 Q120,126 100,132 Q80,126 78,114 Z" fill="#fbbf24" opacity="0.2"/>
  <path d="M80,128 Q100,120 120,128 Q118,140 100,146 Q82,140 80,128 Z" fill="#fbbf24" opacity="0.15"/>
  <!-- arms with armor -->
  <path d="M56,118 Q36,108 26,124 Q38,126 40,140 Q52,130 56,142 Z" fill="#b91c1c"/>
  <path d="M144,118 Q164,108 174,124 Q162,126 160,140 Q148,130 144,142 Z" fill="#b91c1c"/>
  <!-- arm runes -->
  <path d="M30,124 L22,116" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M34,134 L26,130" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M170,124 L178,116" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M166,134 L174,130" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
