<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cosmicAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="70%" stop-color="#7e22ce"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </radialGradient>
    <linearGradient id="maneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="25%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="75%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="hornGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="magicGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- cosmic aura rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="100" cy="105" rx="82" ry="84" fill="url(#cosmicAura)"/>
  <!-- galaxy stars background -->
  <circle cx="20" cy="30" r="1.5" fill="#f0abfc" opacity="0.8"/>
  <circle cx="178" cy="26" r="2" fill="#818cf8" opacity="0.7"/>
  <circle cx="12" cy="80" r="1" fill="#34d399" opacity="0.6"/>
  <circle cx="186" cy="72" r="1.5" fill="#fde047" opacity="0.6"/>
  <circle cx="16" cy="150" r="2" fill="#e879f9" opacity="0.7"/>
  <circle cx="184" cy="155" r="1.5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="30" cy="180" r="1" fill="#c084fc" opacity="0.6"/>
  <circle cx="168" cy="182" r="1.5" fill="#818cf8" opacity="0.6"/>
  <!-- flowing cosmic tail -->
  <path d="M130,152 Q162,138 170,110 Q158,110 154,124" fill="none" stroke="#c084fc" stroke-width="6" stroke-linecap="round" filter="url(#magicGlow)"/>
  <path d="M132,156 Q166,146 174,116" fill="none" stroke="#818cf8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M128,160 Q158,150 166,122" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M124,164 Q154,156 162,130" fill="none" stroke="#fde047" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- cosmic legs -->
  <rect x="70" y="155" width="13" height="33" rx="6.5" fill="#7e22ce"/>
  <rect x="86" y="158" width="13" height="30" rx="6.5" fill="#7e22ce"/>
  <rect x="101" y="155" width="13" height="33" rx="6.5" fill="#7e22ce"/>
  <rect x="116" y="158" width="13" height="30" rx="6.5" fill="#7e22ce"/>
  <!-- glowing hooves -->
  <ellipse cx="76" cy="188" rx="10" ry="5" fill="#c084fc" filter="url(#magicGlow)"/>
  <ellipse cx="92" cy="188" rx="10" ry="5" fill="#c084fc" filter="url(#magicGlow)"/>
  <ellipse cx="107" cy="188" rx="10" ry="5" fill="#c084fc" filter="url(#magicGlow)"/>
  <ellipse cx="122" cy="188" rx="10" ry="5" fill="#c084fc" filter="url(#magicGlow)"/>
  <!-- cosmic body -->
  <ellipse cx="100" cy="126" rx="44" ry="40" fill="url(#bodyGrad)"/>
  <!-- galaxy pattern on body -->
  <ellipse cx="100" cy="134" rx="26" ry="28" fill="#2e1065" opacity="0.3"/>
  <circle cx="90" cy="126" r="2" fill="#c084fc" opacity="0.5"/>
  <circle cx="110" cy="128" r="1.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="98" cy="138" r="1" fill="#fde047" opacity="0.5"/>
  <!-- cosmic wings (ethereal) -->
  <path d="M56,100 Q26,68 28,104 Q40,90 46,106 Q30,118 32,142 Q46,126 54,138 Q42,158 50,172 Q60,152 58,164 Z" fill="#9333ea" opacity="0.7"/>
  <path d="M144,100 Q174,68 172,104 Q160,90 154,106 Q170,118 168,142 Q154,126 146,138 Q158,158 150,172 Q140,152 142,164 Z" fill="#9333ea" opacity="0.7"/>
  <!-- wing magic shimmer -->
  <path d="M30,106 Q42,94 52,106" fill="none" stroke="url(#maneGrad)" stroke-width="2.5" opacity="0.8"/>
  <path d="M32,120 Q44,110 52,120" fill="none" stroke="url(#maneGrad)" stroke-width="2" opacity="0.7"/>
  <path d="M34,134 Q46,126 54,134" fill="none" stroke="url(#maneGrad)" stroke-width="2" opacity="0.6"/>
  <path d="M170,106 Q158,94 148,106" fill="none" stroke="url(#maneGrad)" stroke-width="2.5" opacity="0.8"/>
  <path d="M168,120 Q156,110 148,120" fill="none" stroke="url(#maneGrad)" stroke-width="2" opacity="0.7"/>
  <path d="M166,134 Q154,126 146,134" fill="none" stroke="url(#maneGrad)" stroke-width="2" opacity="0.6"/>
  <!-- neck -->
  <rect x="84" y="78" width="32" height="46" rx="16" fill="#9333ea"/>
  <!-- GRAND cosmic mane -->
  <path d="M74,76 Q52,90 52,110 Q60,100 62,114 Q68,100 68,118 Q76,102 74,118" fill="url(#maneGrad)" opacity="0.95" filter="url(#magicGlow)"/>
  <path d="M126,76 Q148,90 148,110 Q140,100 138,114 Q132,100 132,118 Q124,102 126,118" fill="url(#maneGrad)" opacity="0.85"/>
  <!-- head cosmic -->
  <ellipse cx="100" cy="64" rx="34" ry="28" fill="#c084fc"/>
  <!-- cosmic eye markings -->
  <path d="M70,60 Q74,54 80,60" fill="none" stroke="url(#maneGrad)" stroke-width="1.5" opacity="0.6"/>
  <!-- snout ethereal -->
  <ellipse cx="110" cy="74" rx="15" ry="10" fill="#f5d0fe"/>
  <circle cx="108" cy="74" r="2" fill="#6b21a8" opacity="0.5"/>
  <circle cx="115" cy="74" r="2" fill="#6b21a8" opacity="0.5"/>
  <!-- HUGE cosmic eyes -->
  <circle cx="84" cy="59" r="11" fill="#1e1b4b"/>
  <circle cx="115" cy="59" r="11" fill="#1e1b4b"/>
  <!-- galaxy iris -->
  <circle cx="86" cy="57" r="6" fill="#4c1d95"/>
  <circle cx="117" cy="57" r="6" fill="#4c1d95"/>
  <circle cx="87" cy="56" r="3" fill="#a78bfa" filter="url(#magicGlow)"/>
  <circle cx="118" cy="56" r="3" fill="#a78bfa" filter="url(#magicGlow)"/>
  <circle cx="88" cy="57" r="1.5" fill="white"/>
  <circle cx="119" cy="57" r="1.5" fill="white"/>
  <!-- star sparkle in eye -->
  <circle cx="90" cy="55" r="1" fill="white" opacity="0.8"/>
  <circle cx="121" cy="55" r="1" fill="white" opacity="0.8"/>
  <!-- eyelashes ethereal -->
  <line x1="76" y1="51" x2="73" y2="43" stroke="#6b21a8" stroke-width="2" stroke-linecap="round"/>
  <line x1="81" y1="49" x2="79" y2="41" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="48" x2="85" y2="40" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- LEGENDARY HORN cosmic spiral -->
  <polygon points="100,30 94,62 106,62" fill="url(#hornGrad)" filter="url(#magicGlow)"/>
  <!-- spiral lines on horn -->
  <line x1="100" y1="30" x2="97" y2="48" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="38" x2="103" y2="55" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- horn tip star burst -->
  <circle cx="100" cy="30" r="5" fill="white" opacity="0.9" filter="url(#magicGlow)"/>
  <path d="M100,22 L102,28 L100,30 L98,28 Z" fill="#fde047" filter="url(#magicGlow)"/>
  <path d="M92,30 L98,28 L100,30 L98,32 Z" fill="#fde047" filter="url(#magicGlow)"/>
  <path d="M108,30 L102,32 L100,30 L102,28 Z" fill="#e879f9" filter="url(#magicGlow)"/>
  <!-- grand flowing head mane -->
  <path d="M74,52 Q56,64 58,82 Q66,74 66,86" fill="url(#maneGrad)" opacity="0.9" filter="url(#magicGlow)"/>
  <!-- constellation marks on body -->
  <circle cx="94" cy="115" r="1.5" fill="#c084fc" opacity="0.6"/>
  <circle cx="102" cy="110" r="1" fill="#818cf8" opacity="0.6"/>
  <circle cx="110" cy="118" r="1.5" fill="#34d399" opacity="0.6"/>
  <line x1="94" y1="115" x2="102" y2="110" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="102" y1="110" x2="110" y2="118" stroke="#818cf8" stroke-width="0.5" opacity="0.4"/>
  <!-- sparkle burst -->
  <text x="138" y="46" font-size="14" fill="#f0abfc" filter="url(#magicGlow)">✦</text>
  <text x="48" y="88" font-size="11" fill="#c084fc" opacity="0.8">✦</text>
  <text x="148" y="96" font-size="10" fill="#818cf8" opacity="0.8">✦</text>
  <text x="40" y="148" font-size="9" fill="#e879f9" opacity="0.7">✦</text>
  <text x="156" y="152" font-size="12" fill="#a78bfa" opacity="0.8">✦</text>
  <text x="8" y="110" font-size="10" fill="#34d399" opacity="0.6">✦</text>
  <text x="183" y="108" font-size="9" fill="#fde047" opacity="0.6">✦</text>
</svg>
