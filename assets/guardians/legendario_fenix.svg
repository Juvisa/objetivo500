<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="solarAura" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="70%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <filter id="solarGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- solar aura -->
  <circle cx="100" cy="95" r="96" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="95" r="88" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="100" cy="100" rx="82" ry="86" fill="url(#solarAura)"/>
  <!-- solar ray lines -->
  <line x1="100" y1="4" x2="100" y2="18" stroke="#fde047" stroke-width="2" opacity="0.5"/>
  <line x1="152" y1="16" x2="144" y2="28" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
  <line x1="186" y1="52" x2="174" y2="58" stroke="#f97316" stroke-width="2" opacity="0.4"/>
  <line x1="14" y1="52" x2="26" y2="58" stroke="#f97316" stroke-width="2" opacity="0.4"/>
  <line x1="48" y1="16" x2="56" y2="28" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
  <!-- grand flame tail -->
  <path d="M118,148 Q154,126 166,94 Q150,102 146,120 Q150,90 132,104" fill="none" stroke="#ea580c" stroke-width="9" stroke-linecap="round"/>
  <path d="M122,144 Q158,124 170,90" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M126,140 Q162,122 174,88" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M114,152 Q150,132 162,100" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- divine flame feet -->
  <path d="M72,172 Q64,154 74,144 Q82,154 90,144 Q98,156 90,172 Z" fill="url(#wingGrad)" filter="url(#softGlow)"/>
  <path d="M110,172 Q102,154 112,144 Q120,154 128,144 Q136,156 128,172 Z" fill="url(#wingGrad)" filter="url(#softGlow)"/>
  <!-- body -->
  <ellipse cx="100" cy="116" rx="42" ry="42" fill="url(#bodyGrad)"/>
  <!-- sacred breast feathers -->
  <ellipse cx="100" cy="124" rx="24" ry="28" fill="#fef9c3" opacity="0.8"/>
  <path d="M80,110 Q100,100 120,110 Q118,124 100,130 Q82,124 80,110 Z" fill="#fef9c3" opacity="0.5"/>
  <!-- solar emblem on chest -->
  <circle cx="100" cy="120" r="10" fill="none" stroke="#fde047" stroke-width="1.5" opacity="0.6" filter="url(#softGlow)"/>
  <text x="96" y="124" font-size="10" fill="#fde047" opacity="0.7" filter="url(#softGlow)">☀</text>
  <!-- LEGENDARY WINGS - solar flare -->
  <!-- Left wing -->
  <path d="M58,78 Q6,20 4,82 Q22,56 30,82 Q4,100 6,142 Q28,114 44,134 Q24,164 36,184 Q54,154 54,172 Q58,146 54,162 Z" fill="#ea580c"/>
  <!-- left wing inner flames -->
  <path d="M6,84 Q22,62 36,82" fill="none" stroke="#fde047" stroke-width="2.5" opacity="0.9" filter="url(#softGlow)"/>
  <path d="M6,102 Q22,84 36,100" fill="none" stroke="#fde047" stroke-width="2" opacity="0.8"/>
  <path d="M6,120 Q22,104 36,118" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <path d="M8,138 Q22,124 38,136" fill="none" stroke="#f97316" stroke-width="2" opacity="0.6"/>
  <!-- left wing tip flames -->
  <path d="M4,82 Q-4,64 8,72 Z" fill="#fde047" filter="url(#solarGlow)"/>
  <path d="M4,100 Q-2,86 10,92 Z" fill="#fbbf24" filter="url(#softGlow)"/>
  <!-- Right wing -->
  <path d="M142,78 Q194,20 196,82 Q178,56 170,82 Q196,100 194,142 Q172,114 156,134 Q176,164 164,184 Q146,154 146,172 Q142,146 146,162 Z" fill="#ea580c"/>
  <!-- right wing inner flames -->
  <path d="M194,84 Q178,62 164,82" fill="none" stroke="#fde047" stroke-width="2.5" opacity="0.9" filter="url(#softGlow)"/>
  <path d="M194,102 Q178,84 164,100" fill="none" stroke="#fde047" stroke-width="2" opacity="0.8"/>
  <path d="M194,120 Q178,104 164,118" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <path d="M192,138 Q178,124 162,136" fill="none" stroke="#f97316" stroke-width="2" opacity="0.6"/>
  <!-- right wing tip flames -->
  <path d="M196,82 Q204,64 192,72 Z" fill="#fde047" filter="url(#solarGlow)"/>
  <path d="M196,100 Q202,86 190,92 Z" fill="#fbbf24" filter="url(#softGlow)"/>
  <!-- neck -->
  <rect x="84" y="68" width="32" height="42" rx="16" fill="#f97316"/>
  <!-- head SOLAR DEITY -->
  <circle cx="100" cy="56" r="30" fill="#fb923c"/>
  <!-- solar corona on head -->
  <circle cx="100" cy="56" r="34" fill="none" stroke="#fde047" stroke-width="2.5" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="100" cy="56" r="40" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <!-- divine flame crest -->
  <path d="M74,40 Q80,16 88,30 Q92,10 100,24 Q108,8 112,28 Q120,14 128,38 Q116,26 100,38 Q88,24 74,40 Z" fill="url(#wingGrad)" filter="url(#solarGlow)"/>
  <path d="M84,36 Q90,16 100,28 Q110,14 116,34" fill="none" stroke="#fffbeb" stroke-width="1.5" opacity="0.5"/>
  <!-- sacred beak -->
  <path d="M87,66 L116,58 L104,82 Q96,86 88,76 Z" fill="#fbbf24" filter="url(#softGlow)"/>
  <!-- DIVINE eyes -->
  <ellipse cx="85" cy="50" rx="10" ry="9" fill="#0c0a09" transform="rotate(-12,85,50)"/>
  <ellipse cx="115" cy="50" rx="10" ry="9" fill="#0c0a09" transform="rotate(12,115,50)"/>
  <!-- solar iris -->
  <circle cx="87" cy="48" r="5" fill="#fde047" filter="url(#solarGlow)"/>
  <circle cx="117" cy="48" r="5" fill="#fde047" filter="url(#solarGlow)"/>
  <circle cx="88" cy="49" r="2.5" fill="white"/>
  <circle cx="118" cy="49" r="2.5" fill="white"/>
  <!-- divine mark on forehead -->
  <circle cx="100" cy="40" r="5" fill="#fde047" filter="url(#solarGlow)" opacity="0.9"/>
  <!-- solar aura rings around body -->
  <ellipse cx="100" cy="116" rx="50" ry="52" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <!-- divine stars -->
  <text x="4" y="38" font-size="14" fill="#fde047" filter="url(#softGlow)" opacity="0.9">★</text>
  <text x="181" y="40" font-size="12" fill="#fbbf24" opacity="0.9" filter="url(#softGlow)">★</text>
  <text x="6" y="180" font-size="12" fill="#f97316" opacity="0.7">★</text>
  <text x="180" y="178" font-size="10" fill="#fbbf24" opacity="0.8">★</text>
  <text x="90" y="196" font-size="9" fill="#fde047" opacity="0.7">★</text>
</svg>
