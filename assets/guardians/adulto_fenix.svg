<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="110" rx="90" ry="90" fill="url(#glowOrange)"/>
  <!-- flame tail dramatic -->
  <path d="M120,148 Q152,130 162,100 Q148,106 144,122 Q148,96 130,108" fill="none" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
  <path d="M124,144 Q156,128 166,96" fill="none" stroke="#fde047" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M116,152 Q148,136 158,104" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- flame feet -->
  <path d="M76,172 Q70,158 78,150 Q84,158 90,150 Q96,160 90,172 Z" fill="url(#flameGrad)"/>
  <path d="M110,172 Q104,158 112,150 Q118,158 124,150 Q130,160 124,172 Z" fill="url(#flameGrad)"/>
  <!-- talons -->
  <path d="M70,172 L62,180" stroke="#7c2d12" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M76,175 L72,184" stroke="#7c2d12" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M90,174 L94,182" stroke="#7c2d12" stroke-width="2.5" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="100" cy="120" rx="40" ry="40" fill="url(#bodyGrad)"/>
  <!-- breast feathers layered -->
  <ellipse cx="100" cy="128" rx="22" ry="26" fill="#fef9c3" opacity="0.8"/>
  <path d="M82,112 Q100,104 118,112 Q116,124 100,130 Q84,124 82,112 Z" fill="#fef9c3" opacity="0.5"/>
  <!-- left GRAND wing -->
  <path d="M60,86 Q14,40 10,90 Q26,72 34,92 Q12,108 14,140 Q32,118 48,134 Q32,158 42,174 Q56,150 58,164 Q64,144 60,156 Z" fill="#c2410c"/>
  <!-- left wing flame streaks -->
  <path d="M18,92 Q32,78 44,90" fill="none" stroke="#fde047" stroke-width="2"/>
  <path d="M16,108 Q30,96 44,108" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M16,124 Q30,114 44,124" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M18,140 Q30,132 44,140" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- left wing flame tips -->
  <path d="M10,90 Q6,76 16,82 Z" fill="#fde047" opacity="0.8"/>
  <path d="M12,108 Q6,96 18,100 Z" fill="#fbbf24" opacity="0.7"/>
  <!-- right GRAND wing -->
  <path d="M140,86 Q186,40 190,90 Q174,72 166,92 Q188,108 186,140 Q168,118 152,134 Q168,158 158,174 Q144,150 142,164 Q136,144 140,156 Z" fill="#c2410c"/>
  <!-- right wing flame streaks -->
  <path d="M182,92 Q168,78 156,90" fill="none" stroke="#fde047" stroke-width="2"/>
  <path d="M184,108 Q170,96 156,108" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M184,124 Q170,114 156,124" fill="none" stroke="#fde047" stroke-width="1.5"/>
  <path d="M182,140 Q170,132 156,140" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- right wing flame tips -->
  <path d="M190,90 Q194,76 184,82 Z" fill="#fde047" opacity="0.8"/>
  <path d="M188,108 Q194,96 182,100 Z" fill="#fbbf24" opacity="0.7"/>
  <!-- neck -->
  <rect x="86" y="74" width="28" height="38" rx="14" fill="#ea580c"/>
  <!-- head -->
  <circle cx="100" cy="62" r="28" fill="#fb923c"/>
  <!-- grand flame crest -->
  <path d="M76,48 Q82,28 90,40 Q94,22 100,34 Q106,18 112,34 Q118,26 126,44 Q114,32 100,42 Q90,30 76,48 Z" fill="url(#flameGrad)"/>
  <path d="M86,44 Q92,26 100,36 Q108,24 114,42" fill="none" stroke="#fef9c3" stroke-width="1.5" opacity="0.5"/>
  <!-- beak hooked -->
  <path d="M88,72 L112,66 L104,84 Q96,88 90,80 Z" fill="#fbbf24"/>
  <!-- eyes intense -->
  <ellipse cx="86" cy="57" rx="9" ry="8" fill="#0c0a09" transform="rotate(-10,86,57)"/>
  <ellipse cx="114" cy="57" rx="9" ry="8" fill="#0c0a09" transform="rotate(10,114,57)"/>
  <circle cx="88" cy="55" r="4" fill="#fde047"/>
  <circle cx="116" cy="55" r="4" fill="#fde047"/>
  <circle cx="89" cy="56" r="2" fill="white"/>
  <circle cx="117" cy="56" r="2" fill="white"/>
  <!-- flame aura around head -->
  <circle cx="100" cy="62" r="32" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="62" r="38" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.2"/>
</svg>
