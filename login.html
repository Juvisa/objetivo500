<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover es OBLIGATORIO para el notch del iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Objetivo 500 — Entrar</title>

  <!-- PWA Core -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7C3AED" />

  <!-- Apple / Safari (iOS) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="+500 AURA" />

  <!-- Apple Touch Icons — orden descendente -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png" />
  <link rel="apple-touch-icon" sizes="76x76"   href="/icons/apple-touch-icon-76.png" />
  <link rel="apple-touch-icon"                 href="/icons/apple-touch-icon-180.png" />

  <!-- Apple Splash Screens -->
  <link rel="apple-touch-startup-image" media="(device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3)" href="/splash/splash-390x844.png" />
  <link rel="apple-touch-startup-image" media="(device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2)" href="/splash/splash-375x667.png" />
  <link rel="apple-touch-startup-image" media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2)" href="/splash/splash-414x896.png" />

  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileColor" content="#7C3AED" />
  <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

  <!-- Open Graph -->
  <meta property="og:title"       content="+500 AURA — Entrena para el ICFES" />
  <meta property="og:description" content="Cuida a tu Guardián. Sube de rango. Llega a 500." />
  <meta property="og:image"       content="/icons/icon-512.png" />
  <meta property="og:type"        content="website" />

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(r => console.log('[AURA SW] Registrado:', r.scope))
          .catch(e => console.error('[AURA SW] Error:', e));
      });
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Tailwind Play CDN — prototipo; reemplazar por build para producción -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'aura-bg':      '#0A0A0F',
            'aura-surface': '#111118',
            'aura-surface2':'#1A1A2E',
            'aura-border':  '#1E1E2E',
            'aura-blue':    '#3B82F6',
            'aura-violet':  '#7C3AED',
            'aura-green':   '#10B981',
            'aura-gold':    '#F59E0B',
            'aura-text':    '#F1F5F9',
            'aura-muted':   '#94A3B8',
          },
          minHeight: { 'touch': '44px' },
          minWidth:  { 'touch': '44px' },
        }
      }
    }
  </script>
  <style>
    /* ── Overrides específicos de login ── */
    .login-root {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: var(--space-6) var(--space-4);
      background: var(--bg-base);
      background-image:
        radial-gradient(ellipse 60% 40% at 70% 20%, rgba(124,58,237,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 20% 80%, rgba(16,185,129,.08) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-8) var(--space-7);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03), var(--shadow-xl);
      animation: cardIn .4s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(20px) scale(.98); }
      to   { opacity:1; transform:none; }
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--gradient-brand);
      border-radius: var(--radius-md);
      display: grid; place-items: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
    .logo-sub  { font-size: .75rem; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; }

    /* ── Role selector ── */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .role-btn {
      position: relative;
      padding: var(--space-4) var(--space-3);
      border-radius: var(--radius-lg);
      border: 2px solid var(--border);
      background: var(--bg-elevated);
      cursor: pointer;
      text-align: center;
      transition: border-color .2s, background .2s;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--space-2);
    }

    .role-btn:hover { border-color: rgba(124,58,237,.5); }

    .role-btn.active {
      border-color: var(--accent-purple);
      background: rgba(124,58,237,.12);
    }

    .role-btn.active::after {
      content: '✓';
      position: absolute; top: 8px; right: 10px;
      width: 18px; height: 18px;
      background: var(--accent-purple);
      border-radius: 50%;
      font-size: .6rem; color: #fff;
      display: grid; place-items: center;
    }

    .role-emoji { font-size: 2rem; line-height: 1; }
    .role-label { font-size: .85rem; font-weight: 600; color: var(--text-primary); }
    .role-desc  { font-size: .73rem; color: var(--text-muted); }

    /* ── Tabs (Entrar / Registrarse) ── */
    .auth-tabs {
      display: flex; gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: var(--space-6);
    }

    .tab-btn {
      flex: 1;
      padding: var(--space-2-5) 0;
      min-height: 44px; /* mínimo táctil Apple/Google */
      background: transparent;
      border: none;
      font-size: .85rem; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: background .15s, color .15s;
      touch-action: manipulation;
    }

    .tab-btn.active {
      background: var(--accent-purple);
      color: #fff;
    }

    /* ── Formulario ── */
    .form-group { margin-bottom: var(--space-4); }

    .form-label {
      display: block;
      font-size: .8rem; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--space-1-5);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 1rem; /* ≥16px — previene zoom automático en iOS */
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }

    .form-input::placeholder { color: var(--text-muted); }

    /* Extra fields (solo registro) */
    .register-only { display: none; }
    .register-only.visible { display: block; }

    /* ── Botón principal ── */
    .btn-auth {
      width: 100%;
      padding: var(--space-3-5) 0;
      background: var(--gradient-brand);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-size: .95rem; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: var(--space-2);
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }

    .btn-auth:hover    { opacity: .9; }
    .btn-auth:active   { transform: scale(.98); }
    .btn-auth:disabled { opacity: .5; cursor: not-allowed; }

    .btn-auth .btn-spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }

    .btn-auth.loading .btn-spinner  { display: block; }
    .btn-auth.loading .btn-text     { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mensajes de error / éxito ── */
    .auth-message {
      display: none;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: .82rem;
      margin-top: var(--space-4);
      line-height: 1.5;
    }

    .auth-message.error {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
    }

    .auth-message.success {
      display: block;
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.3);
      color: #34d399;
    }

    /* ── Footer ── */
    .login-footer {
      margin-top: var(--space-6);
      text-align: center;
      font-size: .75rem;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--accent-purple);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-root" role="main">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon" aria-hidden="true">🎯</div>
        <div>
          <div class="logo-text">Objetivo 500</div>
          <div class="logo-sub">Preparación ICFES Saber 11</div>
        </div>
      </div>

      <!-- Selector de rol -->
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:var(--space-3);">Soy…</p>
      <div class="role-selector" role="group" aria-label="Tipo de usuario">
        <button class="role-btn active" id="role-student" aria-pressed="true"
                onclick="setRole('student')">
          <span class="role-emoji" aria-hidden="true">🎓</span>
          <span class="role-label">Estudiante</span>
          <span class="role-desc">Quiero prepararme</span>
        </button>
        <button class="role-btn" id="role-parent" aria-pressed="false"
                onclick="setRole('parent')">
          <span class="role-emoji" aria-hidden="true">👨‍👩‍👧</span>
          <span class="role-label">Padre / Acudiente</span>
          <span class="role-desc">Quiero supervisar</span>
        </button>
      </div>

      <!-- Tabs entrar / registrarse -->
      <div class="auth-tabs" role="tablist">
        <button class="tab-btn active" id="tab-login" role="tab"
                aria-selected="true" aria-controls="panel-login"
                onclick="setTab('login')">Entrar</button>
        <button class="tab-btn" id="tab-register" role="tab"
                aria-selected="false" aria-controls="panel-register"
                onclick="setTab('register')">Registrarse</button>
      </div>

      <!-- Formulario unificado -->
      <form id="auth-form" novalidate>

        <!-- Campo usuario (solo registro) -->
        <div class="form-group register-only" id="field-username">
          <label class="form-label" for="username">Nombre de usuario</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="ej. juancho2026" autocomplete="username"
                 minlength="3" maxlength="30" />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="tu@correo.com" autocomplete="email" required />
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-1-5)">
            <label class="form-label" for="password" style="margin-bottom:0">Contraseña</label>
            <button type="button" id="btn-forgot" onclick="toggleForgot()"
                    style="background:none;border:none;font-size:.75rem;color:var(--accent-purple);cursor:pointer;padding:var(--space-2) var(--space-2);min-height:44px;display:inline-flex;align-items:center;touch-action:manipulation">
              ¿Olvidaste tu contraseña?
            </button>
          </div>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Mínimo 8 caracteres" autocomplete="current-password"
                 minlength="8" required />
        </div>

        <!-- Panel recuperar contraseña (oculto por defecto) -->
        <div id="forgot-panel" style="display:none;margin-bottom:var(--space-4);
             background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);
             border-radius:var(--radius-md);padding:var(--space-4)">
          <p style="font-size:.82rem;color:var(--text-secondary);margin:0 0 var(--space-3)">
            Escribe tu correo y te enviaremos un enlace para restablecer tu contraseña.
          </p>
          <input class="form-input" type="email" id="forgot-email"
                 placeholder="tu@correo.com" autocomplete="email"
                 style="margin-bottom:var(--space-2)" />
          <button type="button" onclick="sendResetEmail()"
                  class="btn-auth" id="btn-reset-send" style="margin-top:0">
            <span class="btn-text">Enviar enlace</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>

        <!-- Grado (solo registro estudiante) -->
        <div class="form-group register-only" id="field-grade">
          <label class="form-label" for="grade">Grado escolar actual</label>
          <select class="form-input" id="grade" name="grade">
            <option value="9">9°</option>
            <option value="10">10°</option>
            <option value="11" selected>11°</option>
          </select>
        </div>

        <!-- Botón -->
        <button class="btn-auth" type="submit" id="btn-submit">
          <span class="btn-text" id="btn-label">Entrar</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>

      </form>

      <!-- Mensajes de estado -->
      <div class="auth-message" id="auth-msg" role="alert" aria-live="polite"></div>

      <!-- Footer -->
      <div class="login-footer">
        Al registrarte aceptas los
        <a href="#" tabindex="-1">Términos de uso</a> y la
        <a href="#" tabindex="-1">Política de privacidad</a>.
      </div>

    </div>
  </div>

  <!-- UI state (sincrónico — disponible antes de que cargue Supabase) -->
  <script>
    let currentRole = 'student';
    let currentTab  = 'login';

    function setRole(role) {
      currentRole = role;
      document.getElementById('role-student').classList.toggle('active', role === 'student');
      document.getElementById('role-parent').classList.toggle('active',  role === 'parent');
      document.getElementById('role-student').setAttribute('aria-pressed', String(role === 'student'));
      document.getElementById('role-parent').setAttribute('aria-pressed',  String(role === 'parent'));
      const gradeField = document.getElementById('field-grade');
      if (gradeField) gradeField.style.display = (role === 'student' && currentTab === 'register') ? 'block' : 'none';
    }

    function setTab(tab) {
      currentTab = tab;
      const fp = document.getElementById('forgot-panel');
      if (fp) fp.style.display = 'none';
      document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').setAttribute('aria-selected',    String(tab === 'login'));
      document.getElementById('tab-register').setAttribute('aria-selected', String(tab === 'register'));
      document.querySelectorAll('.register-only').forEach(el => el.classList.toggle('visible', tab === 'register'));
      const gradeField = document.getElementById('field-grade');
      if (gradeField) gradeField.style.display = (tab === 'register' && currentRole === 'student') ? 'block' : 'none';
      document.getElementById('password').autocomplete = tab === 'register' ? 'new-password' : 'current-password';
      document.getElementById('btn-label').textContent  = tab === 'login' ? 'Entrar' : 'Crear cuenta';
      clearMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('auth-msg');
      el.textContent = text;
      el.className = `auth-message ${type}`;
    }

    function clearMessage() {
      document.getElementById('auth-msg').className = 'auth-message';
    }

    function toggleForgot() {
      const panel = document.getElementById('forgot-panel');
      const open  = panel.style.display === 'none';
      panel.style.display = open ? 'block' : 'none';
      if (open) {
        const emailVal = document.getElementById('email').value.trim();
        if (emailVal) document.getElementById('forgot-email').value = emailVal;
        document.getElementById('forgot-email').focus();
      }
    }
  </script>

  <!-- Supabase UMD — sin módulos ES, funciona desde file:// -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL      = 'https://bekvduhzoxufixykxphy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJla3ZkdWh6b3h1Zml4eWt4cGh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzIwNjksImV4cCI6MjA5MjM0ODA2OX0.S_fSyBAJ1IS9E3H_W7I8vXwEhRqnczNAHa1S7kvKxvM';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true },
    });

    // ── Helpers de perfil ──────────────────────────────────
    async function getProfile() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return null;
      const { data } = await sb.from('profiles').select('*').eq('user_id', user.id).maybeSingle();
      return data ?? null;
    }

    async function ensureProfile(user, role, username, grade) {
      const { data: existing } = await sb.from('profiles').select('id,role').eq('user_id', user.id).maybeSingle();
      if (existing) return existing;
      const { data: profile, error: pe } = await sb.from('profiles')
        .insert({ user_id: user.id, role, username })
        .select('id,role').single();
      if (pe) { showMessage('Error creando perfil: ' + pe.message, 'error'); return null; }
      if (role === 'student') {
        const { error: se } = await sb.from('students').insert({ profile_id: profile.id, grade });
        if (se) console.error('[O500] students insert:', se.message);
      }
      return profile;
    }

    // ── Formulario ─────────────────────────────────────────
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const btn   = document.getElementById('btn-submit');
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;

      if (!email || !pass) { showMessage('Por favor completa todos los campos.', 'error'); return; }
      if (pass.length < 8) { showMessage('La contraseña debe tener al menos 8 caracteres.', 'error'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        if (currentTab === 'login') {
          // ── Login ───────────────────────────────────────
          const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
          if (error) {
            const m = error.message.toLowerCase();
            if (m.includes('invalid') || m.includes('credentials') || m.includes('wrong')) {
              showMessage('Correo o contraseña incorrectos.', 'error');
            } else if (m.includes('not confirmed')) {
              showMessage('Debes confirmar tu correo primero. Revisa tu bandeja de entrada.', 'error');
            } else {
              showMessage('Error: ' + error.message, 'error');
            }
            return;
          }
          // Asegurar perfil (fallback si el trigger falló)
          const meta = data.user.user_metadata ?? {};
          let profile = await getProfile();
          if (!profile) {
            profile = await ensureProfile(
              data.user,
              meta.role || 'student',
              meta.username || email.split('@')[0],
              Number(meta.grade) || 11
            );
          }
          if (!profile) return;
          window.location.href = profile.role === 'parent' ? './dashboard-padre.html' : './app.html';

        } else {
          // ── Registro ────────────────────────────────────
          const username = document.getElementById('username').value.trim();
          const grade    = parseInt(document.getElementById('grade')?.value ?? '11', 10);

          if (!username || username.length < 3) {
            showMessage('El nombre de usuario debe tener al menos 3 caracteres.', 'error'); return;
          }
          if (!/^[a-zA-Z0-9_.-]+$/.test(username)) {
            showMessage('Solo letras, números, puntos, guiones y guion bajo.', 'error'); return;
          }

          const { data, error } = await sb.auth.signUp({
            email, password: pass,
            options: { data: { role: currentRole, username, grade } },
          });

          if (error) {
            const m = error.message.toLowerCase();
            showMessage(m.includes('already') ? 'Este correo ya está registrado. Usa Entrar.' : 'Error: ' + error.message, 'error');
            return;
          }

          const user = data?.user;
          if (!user) {
            showMessage('Este correo ya fue registrado. Inicia sesión.', 'error'); return;
          }

          // Si hay sesión inmediata (email confirmation OFF), crear perfil ahora
          if (data.session) {
            const profile = await ensureProfile(user, currentRole, username, grade);
            if (profile) {
              showMessage('✅ ¡Cuenta creada! Redirigiendo…', 'success');
              setTimeout(() => {
                window.location.href = currentRole === 'parent' ? './dashboard-padre.html' : './app.html';
              }, 1000);
              return;
            }
          }
          showMessage('✅ ¡Cuenta creada! Ahora inicia sesión.', 'success');
          setTimeout(() => setTab('login'), 2000);
        }
      } catch (err) {
        showMessage('Error inesperado: ' + err.message, 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    // ── Recuperar contraseña ───────────────────────────────
    async function sendResetEmail() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) { showMessage('Escribe tu correo para continuar.', 'error'); return; }

      const btn = document.getElementById('btn-reset-send');
      btn.classList.add('loading'); btn.disabled = true;

      const redirectTo = window.location.origin + '/reset-password.html';
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });

      btn.classList.remove('loading'); btn.disabled = false;

      if (error) {
        showMessage('Error: ' + error.message, 'error');
      } else {
        document.getElementById('forgot-panel').style.display = 'none';
        showMessage('✅ Revisa tu correo — te enviamos el enlace para restablecer tu contraseña.', 'success');
      }
    }

    // ── Redirección si ya hay sesión activa ────────────────
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const profile = await getProfile();
      if (profile) window.location.href = profile.role === 'parent' ? './dashboard-padre.html' : './app.html';
    })();
  </script>
</body>
</html>
