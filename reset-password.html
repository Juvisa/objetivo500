<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objetivo 500 — Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-root {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: var(--space-6) var(--space-4);
      background: var(--bg-base);
      background-image:
        radial-gradient(ellipse 60% 40% at 70% 20%, rgba(124,58,237,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 20% 80%, rgba(16,185,129,.08) 0%, transparent 50%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-8) var(--space-7);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03), var(--shadow-xl);
      animation: cardIn .4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(20px) scale(.98); }
      to   { opacity:1; transform:none; }
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--gradient-brand);
      border-radius: var(--radius-md);
      display: grid; place-items: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
    .logo-sub  { font-size: .75rem; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; }
    .form-group { margin-bottom: var(--space-4); }
    .form-label {
      display: block;
      font-size: .8rem; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--space-1-5);
    }
    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .btn-auth {
      width: 100%;
      padding: var(--space-3-5) 0;
      background: var(--gradient-brand);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-size: .95rem; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: var(--space-2);
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .btn-auth:hover    { opacity: .9; }
    .btn-auth:active   { transform: scale(.98); }
    .btn-auth:disabled { opacity: .5; cursor: not-allowed; }
    .btn-auth .btn-spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn-auth.loading .btn-spinner { display: block; }
    .btn-auth.loading .btn-text    { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-message {
      display: none;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: .82rem;
      margin-top: var(--space-4);
      line-height: 1.5;
    }
    .auth-message.error {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
    }
    .auth-message.success {
      display: block;
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.3);
      color: #34d399;
    }
  </style>
</head>
<body>
  <div class="login-root" role="main">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon" aria-hidden="true">🎯</div>
        <div>
          <div class="logo-text">Objetivo 500</div>
          <div class="logo-sub">Preparación ICFES Saber 11</div>
        </div>
      </div>

      <h2 style="font-size:1.1rem;font-weight:700;color:var(--text-primary);margin:0 0 var(--space-2)">
        Nueva contraseña
      </h2>
      <p style="font-size:.82rem;color:var(--text-muted);margin:0 0 var(--space-6)">
        Elige una contraseña segura para tu cuenta.
      </p>

      <!-- Estado: enlace inválido -->
      <div id="state-invalid" style="display:none">
        <div style="text-align:center;padding:var(--space-6) 0">
          <div style="font-size:2.5rem;margin-bottom:12px">⚠️</div>
          <p style="color:var(--text-secondary);font-size:.9rem;margin:0 0 var(--space-4)">
            Este enlace no es válido o ya expiró.
          </p>
          <a href="./login.html"
             style="color:var(--accent-purple);font-size:.85rem;text-decoration:none;font-weight:600">
            Volver al inicio de sesión →
          </a>
        </div>
      </div>

      <!-- Formulario nueva contraseña -->
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="new-password">Nueva contraseña</label>
          <input class="form-input" type="password" id="new-password"
                 placeholder="Mínimo 8 caracteres" autocomplete="new-password"
                 minlength="8" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <input class="form-input" type="password" id="confirm-password"
                 placeholder="Repite tu nueva contraseña" autocomplete="new-password"
                 minlength="8" required />
        </div>
        <button class="btn-auth" type="submit" id="btn-submit">
          <span class="btn-text">Guardar contraseña</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </form>

      <div class="auth-message" id="auth-msg" role="alert" aria-live="polite"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/supabase-config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true },
    });

    function showMessage(text, type) {
      const el = document.getElementById('auth-msg');
      el.textContent = text;
      el.className = `auth-message ${type}`;
    }

    // Ocultar formulario hasta confirmar que el enlace es válido
    document.getElementById('reset-form').style.display = 'none';

    let recoveryDetected = false;

    // Supabase v2 dispara PASSWORD_RECOVERY cuando procesa el token del email
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryDetected = true;
        document.getElementById('reset-form').style.display = 'block';
        document.getElementById('state-invalid').style.display = 'none';
      }
    });

    // Si en 3s no llegó el evento PASSWORD_RECOVERY → enlace inválido
    setTimeout(() => {
      if (!recoveryDetected) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('state-invalid').style.display = 'block';
      }
    }, 3000);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const pass    = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (pass.length < 8) {
        showMessage('La contraseña debe tener al menos 8 caracteres.', 'error'); return;
      }
      if (pass !== confirm) {
        showMessage('Las contraseñas no coinciden.', 'error'); return;
      }

      const btn = document.getElementById('btn-submit');
      btn.classList.add('loading'); btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password: pass });

      btn.classList.remove('loading'); btn.disabled = false;

      if (error) {
        showMessage('Error: ' + error.message, 'error');
      } else {
        showMessage('✅ ¡Contraseña actualizada! Redirigiendo…', 'success');
        setTimeout(() => { window.location.href = './login.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
